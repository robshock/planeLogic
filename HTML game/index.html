<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flying Airplane</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="countdown">3</div>
  <div id="gameOverScreen">GAME OVER</div>

  <button class="arrow-button" id="arrowBtn">
    <img src="pngs/arrowUp.png" alt="arrowUp" class="arrow" id="arrowImg">
  </button>

  <button id="arrowBtn2" class="arrow-button">
    <img src="pngs/arrowUp.png" class="arrowUp" id="arrowImg2">
  </button>

  <img src="pngs/greenRight.png" class="airplane" id="plane">
  <img src="pngs/yellowRight.png" class="airplane" id="plane2">
  <img src="pngs/BlueRight.png" class="airplane" id="plane3">
  <img src="pngs/houseGreen.png" class="houseGreen" id="house1">
  <img src="pngs/houseYellow.png" class="houseYellow" id="house2">
  <img src="pngs/houseBlue.png" class="houseBlue" id="house3">
  
  <script src="game.js"></script>

</body>
</html>
